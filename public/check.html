<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="menu.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-right">
            <img src="logo.png" alt="Netflix" class="logo">
            <ul class="nav-links">
                <li class="active">Home</li>
                <li>TV Shows</li>
                <li>Movies</li>
                <li>Games</li>
                <li>New & Popular</li>
                <li>My List</li>
                <li>Browse by Languages</li>
            </ul>
        </div>
        <div class="nav-left">
            <i class="fas fa-search nav-icon" style="margin-left: 15px;"></i>
            <i class="fas fa-bell nav-icon" style="margin-left: 15px;"></i>
            <div class="profile-dropdown">
                <img src="profile1.png" alt="Profile" id="navAvatar" class="nav-avatar">
            </div>
        </div>
    </nav>

    <header class="hero-banner">
        <div class="hero-content">
            <div class="hero-badge"><i class="fas fa-gamepad"></i> משחק נייד חדש</div>
            <h2 class="hero-title">סוליטר נטפליקס</h2>
            <p class="hero-desc">סדר את הקלפים בסדר יורד ובצבעים מתחלפים. המשחק הנצחי שכולנו אוהבים.</p>
            <div class="hero-buttons">
                <button class="btn-play"><i class="fas fa-play"></i> שחק עכשיו</button>
            </div>
        </div>
    </header>

    <main class="main-feed-container">
        <section class="controls-section">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="חפש בקטלוג לפי שם או תיאור...">
            </div>
            <div class="alphabet-filter">
                <button class="alphabet-btn active" data-letter="all">הכל</button>
            </div>
        </section>

        <section id="searchResultsSection" class="search-results-section" style="display:none;">
            <h3 class="category-title" style="color: #e50914;">תוצאות חיפוש</h3>
            <div class="feed-row" id="searchResultsGrid"></div>
        </section>

        <section>
            <h3 class="category-title" id="rowTitle">המשך צפייה</h3>
            <div class="feed-row" id="userFeedGrid"></div>
        </section>

        <section>
            <h3 class="category-title">הקטלוג המלא</h3>
            <div class="feed-row" id="allCatalogGrid"></div>
        </section>
    </main>

    <script>
        let catalog = [];
        let activeUser = { name: '', consumed: [] };

        const urlParams = new URLSearchParams(window.location.search);
        const currentUserKey = urlParams.get('user') || 'Ayala';
        document.getElementById('navAvatar').src = urlParams.get('avatar') || 'profile1.png';

        async function loadDashboardData() {
            try {
                const response = await fetch('/api/data'); 
                const data = await response.json();
                catalog = data.catalog;
                activeUser = data.personas.find(u => u.username === currentUserKey) || data.personas[0];

                document.getElementById('rowTitle').textContent = `המשך צפייה עבור ${activeUser.name}`;
                initAlphabetFilters();
                initGrids();
            } catch (error) {
                console.error("שגיאה בטעינת נתונים:", error);
            }
        }

        function createMovieCardHTML(item) {
            return `
                <div class="movie-card" data-id="${item._id}">
                    <div class="movie-image-container">
                        <img src="${item.image}" alt="${item.title}" class="movie-img">
                    </div>
                    <div class="movie-info">
                        <div class="movie-title">${item.title}</div>
                        <div class="card-actions">
                            <button class="like-btn ${item.liked ? 'liked' : ''}" onclick="toggleLike('${item._id}')">
                                <i class="fas fa-heart"></i> לייק
                            </button>
                            <span class="likes-count"><span class="count-val">${item.likes}</span></span>
                        </div>
                    </div>
                </div>
            `;
        }

        function initGrids() {
            const userFeedGrid = document.getElementById('userFeedGrid');
            const allCatalogGrid = document.getElementById('allCatalogGrid');
            // משתמשים ב-.includes על המערך של ה-_ids שקיבלנו מה-DB
            const userItems = catalog.filter(item => activeUser.consumed.includes(item._id));
            
            userFeedGrid.innerHTML = userItems.map(item => createMovieCardHTML(item)).join('');
            allCatalogGrid.innerHTML = catalog.map(item => createMovieCardHTML(item)).join('');
        }

        window.toggleLike = function(movieId) {
            const item = catalog.find(m => m._id === movieId); // חיפוש לפי _id
            if (!item) return;

            item.liked = !item.liked;
            item.likes += item.liked ? 1 : -1;

            const cards = document.querySelectorAll(`.movie-card[data-id="${movieId}"]`);
            cards.forEach(card => {
                card.querySelector('.like-btn').classList.toggle('liked', item.liked);
                card.querySelector('.count-val').textContent = item.likes;
            });
        };

        // שאר הפונקציות (handleFilter, alphabet) נשארות דומות...
        // רק לוודא שהן משתמשות ב-item.title/item.desc שהם לא השתנו.
        
        loadDashboardData();
    </script>
</body>
</html>
